<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodis - Robot Rasim AI</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body>

<div class="bg-icons" id="bg-icons"></div>

<header>
    <div class="header-left">
        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Rasim&backgroundColor=ff4757" class="rasim-avatar" alt="Rasim">
        <div><h3 style="margin:0">Foodis</h3><small>Rasim Ultra 2.0</small></div>
    </div>
    <button class="mode-toggle-btn" id="theme-btn" onclick="toggleDarkMode()">☀️</button>
</header>

<div id="chat-container">
    <div class="bubble rasim">
        🤖 <b>ROBOT RASİM</b><br>
        Mətbəxin ağası gəldi! Soyuducuda nə var? De gəlsin, sənə ən yaxşı resepti verim!
    </div>
</div>

<div class="input-area">
    <input type="text" id="user-input" placeholder="Məs: 2 nəfərik, toyuq..." onkeypress="if(event.key==='Enter') askRasim()">
    <button class="btn-send" onclick="askRasim()">Rasimə De</button>
</div>

<script>
    const GROQ_API_KEY = "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";

    function createBgIcons() {
        const container = document.getElementById('bg-icons');
        const icons = ['🍎', '🥦', '🍗', '🥘', '🍅'];
        for (let i = 0; i < 15; i++) {
            const icon = document.createElement('div');
            icon.className = 'floating-icon';
            icon.innerText = icons[Math.floor(Math.random() * icons.length)];
            icon.style.left = Math.random() * 100 + 'vw';
            icon.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(icon);
        }
    }
    createBgIcons();

    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        document.getElementById('theme-btn').innerText = document.body.classList.contains('dark-mode') ? '🌙' : '☀️';
    }

    // CANLI VİZUAL TAYMER (BÖYÜK)
    function startVisualTimer(id, minutes) {
        let seconds = minutes * 60;
        const total = seconds;
        const display = document.getElementById(`time-txt-${id}`);
        const bar = document.getElementById(`bar-${id}`);
        const btn = document.getElementById(`btn-${id}`);
        
        btn.style.display = 'none'; 
        
        const interval = setInterval(() => {
            seconds--;
            let mins = Math.floor(seconds / 60);
            let secs = seconds % 60;
            display.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            
            let percent = (seconds / total) * 100;
            bar.style.width = percent + "%";

            if (seconds <= 0) {
                clearInterval(interval);
                display.innerText = "HAZIRDIR! 🥘";
                display.style.fontSize = "2.5rem";
                confetti({ particleCount: 200, spread: 100 });
                let audio = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
                audio.play();
            }
        }, 1000);
    }

    async function askRasim() {
        const input = document.getElementById('user-input');
        const container = document.getElementById('chat-container');
        const text = input.value.trim();
        if (!text) return;

        container.innerHTML += `<div class="bubble user">${text}</div>`;
        input.value = "";

        // Spotify Pleylisti
        if (text.toLowerCase().includes("mahnı") || text.toLowerCase().includes("musiqi")) {
            container.innerHTML += `
                <div class="bubble rasim">
                    🎵 <b>RASİM PLEYLİST</b><br>
                    Mətbəx üçün pleylist hazırlandı!<br>
                    <iframe class="spotify-box" src="https://open.spotify.com/embed/playlist/37i9dQZF1DXbITWG1ZJKYp" allow="encrypted-media"></iframe>
                </div>`;
            container.scrollTo(0, container.scrollHeight);
            return;
        }

        const loadingId = "loading-" + Date.now();
        container.innerHTML += `<div class="bubble rasim" id="${loadingId}">Rasim düşünür...</div>`;
        container.scrollTo(0, container.scrollHeight);

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${GROQ_API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{ role: "system", content: "Sən Robot Rasimsən. Səmimi Azərbaycan dilində cavab ver. Əgər bişirmə müddəti varsa, mütləq 'MÜDDƏT: [Rəqəm] dəqiqə' formatında qeyd et." }, { role: "user", content: text }]
                })
            });

            const data = await response.json();
            let rasimText = data.choices[0].message.content;

            // Taymer tap
            const timeMatch = rasimText.match(/MÜDDƏT:\s*(\d+)/);
            const timerId = Date.now();
            let timerHtml = "";
            if (timeMatch) {
                timerHtml = `
                    <div class="timer-container">
                        <div style="font-weight:bold; margin-bottom:10px; color:var(--text)">Mətbəxt Taymeri</div>
                        <div class="timer-display" id="time-txt-${timerId}">${timeMatch[1]}:00</div>
                        <div class="progress-bg"><div class="progress-fill" id="bar-${timerId}"></div></div>
                        <button class="btn-send" id="btn-${timerId}" style="margin-top:20px; width:100%; font-size:1.1rem" onclick="startVisualTimer('${timerId}', ${timeMatch[1]})">Vaxdı Başlat</button>
                    </div>`;
            }

            document.getElementById(loadingId).innerHTML = `
                🤖 <b>ROBOT RASİM</b><br><br>
                ${rasimText.replace(/\n/g, '<br>')}
                ${timerHtml}
            `;
        } catch (e) { document.getElementById(loadingId).innerText = "Rasimin beyni qızdı, bir az sonra yoxla!"; }
        container.scrollTo(0, container.scrollHeight);
    }
</script>
</body>
</html>
