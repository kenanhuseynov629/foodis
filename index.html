<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodis - Robot Rasim Ultra Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="main-body">

<div class="bg-icons" id="bg-icons"></div>

<header>
    <div class="header-left">
        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Rasim&backgroundColor=ff4757" class="rasim-avatar" alt="Rasim">
        <div>
            <h2 style="margin:0">Foodis</h2>
            <small>Robot Rasim Ultra Pro</small>
        </div>
    </div>
    <button class="btn" style="background:var(--text); color:white" onclick="toggleDarkMode()">Gecə/Gündüz</button>
</header>

<div id="chat-container">
    <div class="bubble rasim">
        <span style="font-size: 12px; color: var(--primary); font-weight: bold;">🤖 ROBOT RASİM</span><br>
        Xoş gəldin! Layihəni böyütdük, artıq CSS faylımız da var! 🚀 De görüm, bu gün nə bişiririk?
    </div>
</div>

<div class="input-area">
    <input type="text" id="user-input" placeholder="Məs: 2 nəfərik, kartof, yumurta..." onkeypress="if(event.key==='Enter') askRasim()">
    <button class="btn btn-send" onclick="askRasim()">Rasimə De</button>
</div>

<script>
    const GROQ_API_KEY = "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";
    const bgIconsContainer = document.getElementById('bg-icons');
    const icons = ['🍎', '🥦', '🍗', '🍳', '🧂', '🥘', '🔪', '🍅'];

    function createBgIcons() {
        for (let i = 0; i < 15; i++) {
            const icon = document.createElement('div');
            icon.className = 'floating-icon';
            icon.innerText = icons[Math.floor(Math.random() * icons.length)];
            icon.style.left = Math.random() * 100 + 'vw';
            icon.style.animationDelay = Math.random() * 5 + 's';
            bgIconsContainer.appendChild(icon);
        }
    }
    createBgIcons();

    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }

    async function askRasim() {
        const input = document.getElementById('user-input');
        const container = document.getElementById('chat-container');
        const text = input.value.trim();
        if (!text) return;

        container.innerHTML += `<div class="bubble user">${text}</div>`;
        input.value = "";
        
        const loadingId = "loading-" + Date.now();
        container.innerHTML += `
            <div class="bubble rasim" id="${loadingId}">
                <span style="font-size: 12px; color: var(--primary); font-weight: bold;">🤖 ROBOT RASİM</span><br>
                Rasim resepti analiz edir...
                <div class="voice-wave">
                    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
                </div>
            </div>`;
        
        container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${GROQ_API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: "Sən Foodis aşpazı Rasimsən. Səmimi Azərbaycan dilində danış. Cavabın sonunda 'Çətinlik: X/10' formatında qeyd et." },
                        { role: "user", content: text }
                    ]
                })
            });

            const data = await response.json();
            const rasimText = data.choices[0].message.content;
            const diffMatch = rasimText.match(/Çətinlik:\s*(\d+)/);
            const diffPercent = diffMatch ? diffMatch[1] * 10 : 50;

            document.getElementById(loadingId).innerHTML = `
                <span style="font-size: 12px; color: var(--primary); font-weight: bold;">🤖 ROBOT RASİM</span><br>
                ${rasimText.replace(/\n/g, '<br>')}
                <div style="margin-top:15px; font-size:11px;">HAZIRLANMA ÇƏTİNLİYİ:</div>
                <div class="progress-container"><div class="progress-bar" style="width:${diffPercent}%"></div></div>
                <a href="https://wa.me/?text=Rasim mənə əla resept verdi!" target="_blank" class="share-btn">WhatsApp-da Paylaş 📱</a>
            `;
        } catch (e) { document.getElementById(loadingId).innerText = "Xəta baş verdi!"; }
        container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
    }
</script>
</body>
</html>
