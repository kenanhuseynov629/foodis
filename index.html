<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodis - Robot Rasim</title>
    <style>
        :root { --primary: #ff4757; --secondary: #2ed573; --bg: #f1f2f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #chat-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .bubble { max-width: 85%; padding: 12px 18px; border-radius: 20px; font-size: 16px; line-height: 1.5; box-shadow: 2px 2px 5px rgba(0,0,0,0.05); }
        .rasim { background: white; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #ddd; }
        .user { background: var(--secondary); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .label { display: block; font-size: 11px; margin-bottom: 5px; font-weight: bold; text-transform: uppercase; color: #888; }
        .input-area { background: white; padding: 20px; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 15px; border: 2px solid #eee; border-radius: 30px; outline: none; font-size: 16px; }
        button { background: var(--primary); color: white; border: none; padding: 0 25px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .typing { font-style: italic; color: #777; }
    </style>
</head>
<body>

<header>
    <h1>Foodis 🍳</h1>
    <p>Robot Rasim: "Mətbəxin ağası gəldi!"</p>
</header>

<div id="chat-container">
    <div class="bubble rasim">
        <span class="label">🤖 Robot Rasim</span>
        Salam! Kalbasa-yumurta hazırdır? De gəlsin, görək nə bişiririk!
    </div>
</div>

<div class="input-area">
    <input type="text" id="user-input" placeholder="Məs: yumurta, pomidor..." onkeypress="if(event.key==='Enter') askRasim()">
    <button onclick="askRasim()">Rasimə De</button>
</div>

<script type="module">
    // Kitabxananın ən stabil versiyasını çağırırıq
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    const API_KEY = "AIzaSyAdwswjgW9U_irY7NijpTRgG8kxlyVGY1A"; 
    const genAI = new GoogleGenerativeAI(API_KEY);

    window.askRasim = async function() {
        const input = document.getElementById('user-input');
        const container = document.getElementById('chat-container');
        const text = input.value.trim();

        if (!text) return;

        container.innerHTML += `<div class="bubble user"><span class="label">Sən</span>${text}</div>`;
        input.value = "";
        
        const loadingId = "loading-" + Date.now();
        container.innerHTML += `<div class="bubble rasim typing" id="${loadingId}"><span class="label">🤖 Robot Rasim</span>Rasim düşünür... 🤔</div>`;
        container.scrollTop = container.scrollHeight;

        try {
            // ƏSAS DƏYİŞİKLİK BURADADIR: "gemini-pro" modelini sınaqdan keçiririk
            // Bu model 1.5-flash-dan daha stabil qoşulur bəzi regionlarda
            const model = genAI.getGenerativeModel({ model: "gemini-pro" });

            const result = await model.generateContent(`Sən Foodis saytında Robot Rasimsən. Azərbaycan dilində danışırsan. İstifadəçinin bu ərzaqları var: ${text}. Ona ləzzətli bir resept ver.`);
            const response = await result.response;
            const rasimText = response.text();

            document.getElementById(loadingId).classList.remove('typing');
            document.getElementById(loadingId).innerHTML = `<span class="label">🤖 Robot Rasim</span>${rasimText.replace(/\n/g, '<br>')}`;
        } catch (error) {
            console.error(error);
            // Əgər gemini-pro da xəta versə, avtomatik flash-a keçid cəhdi:
            try {
                const altModel = genAI.getGenerativeModel({ model: "gemini-1.5-flash-latest" });
                const altResult = await altModel.generateContent(`Ərzaqlar: ${text}. Resept de.`);
                const altRes = await altResult.response;
                document.getElementById(loadingId).innerHTML = `<span class="label">🤖 Robot Rasim</span>${altRes.text().replace(/\n/g, '<br>')}`;
            } catch (e2) {
                document.getElementById(loadingId).innerHTML = `<span class="label">🤖 Robot Rasim</span>Ay daa, Google-un serverləri mənə cavab vermir. Bir az sonra yenidən yoxla! 🤯`;
            }
        }
        container.scrollTop = container.scrollHeight;
    }
</script>

</body>
</html>
