<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodis - Robot Rasim (Pro)</title>
    <style>
        :root {
            --primary: #ff4757;
            --secondary: #2ed573;
            --bg: #f1f2f6;
            --card: #ffffff;
            --text: #2d3436;
        }

        /* Gecə Rejimi Stilləri */
        body.dark-mode {
            --bg: #2f3542;
            --card: #3f4452;
            --text: #f1f2f6;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            transition: 0.3s;
        }

        header {
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .header-left { display: flex; align-items: center; gap: 10px; }
        .rasim-avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid white; background: #eee; }

        #chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .bubble {
            max-width: 85%;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 16px;
            line-height: 1.6;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.05);
            position: relative;
        }

        .rasim { background: var(--card); align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #ddd; }
        .user { background: var(--secondary); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }

        .label { display: block; font-size: 11px; margin-bottom: 5px; font-weight: bold; text-transform: uppercase; color: #888; }

        /* Yazılır Animasiyası */
        .typing::after {
            content: '...';
            animation: dots 1.5s infinite;
        }
        @keyframes dots {
            0% { content: '.'; }
            33% { content: '..'; }
            66% { content: '...'; }
        }

        .input-area {
            background: var(--card);
            padding: 20px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #ddd;
        }

        input {
            flex: 1;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 30px;
            outline: none;
            background: var(--bg);
            color: var(--text);
        }

        .btn {
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-send { background: var(--primary); color: white; }
        .btn-mode { background: #57606f; color: white; padding: 5px 15px; font-size: 12px; }
        .share-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 5px 12px;
            background: #25D366;
            color: white;
            border-radius: 15px;
            text-decoration: none;
            font-size: 13px;
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Rasim" class="rasim-avatar" alt="Rasim">
        <div>
            <h2 style="margin:0">Foodis</h2>
            <small>Robot Rasim Online</small>
        </div>
    </div>
    <button class="btn btn-mode" onclick="toggleDarkMode()">Gecə/Gündüz</button>
</header>

<div id="chat-container">
    <div class="bubble rasim">
        <span class="label">🤖 Robot Rasim</span>
        Salam! Soyuducuda nələr var? Neçə nəfərsiz? De gəlsin, əla bir resept hazırlayaq! 🍳
    </div>
</div>

<div class="input-area">
    <input type="text" id="user-input" placeholder="Məs: 5 nəfərik, toyuq, soğan..." onkeypress="if(event.key==='Enter') askRasim()">
    <button class="btn btn-send" onclick="askRasim()">Rasimə De</button>
</div>

<script>
    const GROQ_API_KEY = "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";
    let lastRasimResponse = "";

    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
    }

    async function askRasim() {
        const input = document.getElementById('user-input');
        const container = document.getElementById('chat-container');
        const text = input.value.trim();

        if (!text) return;

        container.innerHTML += `<div class="bubble user"><span class="label">Sən</span>${text}</div>`;
        input.value = "";
        
        const loadingId = "loading-" + Date.now();
        container.innerHTML += `<div class="bubble rasim typing" id="${loadingId}"><span class="label">🤖 Robot Rasim</span>Rasim qazanları yoxlayır</div>`;
        container.scrollTop = container.scrollHeight;

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${GROQ_API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        {
                            role: "system",
                            content: `Sən Foodis saytında peşəkar Azərbaycanlı aşpaz Robot Rasimsən. 
                            1. Təmiz Azərbaycan dilində danış. 
                            2. Əgər istifadəçi "neçə nəfər" olduqlarını deyibsə (məs: 5 nəfərik), resepti MÜTLƏQ o porsiyaya uyğun hesabla və miqdarları artır.
                            3. Səmimi və zarafatcıl ol.
                            4. Reseptin sonuna mütləq "Nu ş olsun!" yaz.`
                        },
                        {
                            role: "user",
                            content: text
                        }
                    ]
                })
            });

            const data = await response.json();
            lastRasimResponse = data.choices[0].message.content;

            const loadingBubble = document.getElementById(loadingId);
            loadingBubble.classList.remove('typing');
            
            // Cavabı və Paylaş düyməsini əlavə et
            loadingBubble.innerHTML = `
                <span class="label">🤖 Robot Rasim</span>
                ${lastRasimResponse.replace(/\n/g, '<br>')}
                <br>
                <a href="https://wa.me/?text=${encodeURIComponent('Rasim mənə bu gün bunu məsləhət gördü: ' + lastRasimResponse.substring(0, 100) + '...')}" 
                   target="_blank" class="share-btn">WhatsApp-da Paylaş 📱</a>
            `;
        } catch (error) {
            document.getElementById(loadingId).innerHTML = `<span class="label">🤖 Robot Rasim</span>Ay daa, nəsə ilişdi! Yenidən yaza bilərsən?`;
        }
        container.scrollTop = container.scrollHeight;
    }
</script>

</body>
</html>
