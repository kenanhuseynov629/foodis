<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodis - Robot Rasim AI</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body>

<div class="bg-icons" id="bg-icons"></div>

<header>
    <div class="header-left">
        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Rasim&backgroundColor=ff4757" class="rasim-avatar" alt="Rasim">
        <div>
            <h2 style="margin:0">Foodis</h2>
            <small>Rasim: Səsli & Ağıllı Kömekçi</small>
        </div>
    </div>
    <button class="mode-toggle-btn" id="theme-btn" onclick="toggleDarkMode()">☀️</button>
</header>

<div id="chat-container">
    <div class="bubble rasim">
        <span style="font-size: 11px; color: var(--primary); font-weight: bold;">🤖 ROBOT RASİM</span><br>
        Salam! Rasim gəldi. İstəsən resept verim, istəsən Spotify-dan mahnı qoşum, istəsən taymer qurum. Nə edək?
    </div>
</div>

<div class="input-area">
    <input type="text" id="user-input" placeholder="Məs: Kartof qızartması resepti və mahnı qoş..." onkeypress="if(event.key==='Enter') askRasim()">
    <button class="btn-send" onclick="askRasim()">Rasimə De</button>
</div>

<script>
    const GROQ_API_KEY = "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";

    // Fon İkonları
    function createBgIcons() {
        const container = document.getElementById('bg-icons');
        const icons = ['🍎', '🥦', '🍗', '🍳', '🥘', '🍅', '🧅'];
        for (let i = 0; i < 15; i++) {
            const icon = document.createElement('div');
            icon.className = 'floating-icon';
            icon.innerText = icons[Math.floor(Math.random() * icons.length)];
            icon.style.left = Math.random() * 100 + 'vw';
            icon.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(icon);
        }
    }
    createBgIcons();

    // Gecə/Gündüz Keçidi
    function toggleDarkMode() {
        const body = document.body;
        const btn = document.getElementById('theme-btn');
        body.classList.toggle('dark-mode');
        btn.innerText = body.classList.contains('dark-mode') ? '🌙' : '☀️';
    }

    // Səsli Oxuma Funksiyası
    function speak(text) {
        window.speechSynthesis.cancel(); // Əvvəlki səsi dayandır
        const utterance = new SpeechSynthesisUtterance(text.substring(0, 300)); // Limit 300 char
        utterance.lang = 'tr-TR'; // Azərbaycan dili üçün ən yaxın səs
        utterance.rate = 1.0;
        window.speechSynthesis.speak(utterance);
    }

    // Taymer Funksiyası
    function startTimer(minutes) {
        alert(minutes + " dəqiqəlik taymer başladı!");
        setTimeout(() => {
            alert("VAXT BİTDİ! Yeməyə bax!");
            speak("Vaxt bitdi, yeməyə bax!");
        }, minutes * 60 * 1000);
    }

    async function askRasim() {
        const input = document.getElementById('user-input');
        const container = document.getElementById('chat-container');
        const text = input.value.trim();
        if (!text) return;

        container.innerHTML += `<div class="bubble user">${text}</div>`;
        input.value = "";

        // Spotify İstəyi Yoxla
        if (text.toLowerCase().includes("mahnı") || text.toLowerCase().includes("playlist")) {
            container.innerHTML += `
                <div class="bubble rasim">
                    <span style="font-size: 11px; color: var(--primary); font-weight: bold;">🎵 RASİMİN MUSİQİSİ</span><br>
                    Mətbəxdə kefin olsun! Al sənə özəl pleylist:<br>
                    <iframe class="spotify-box" src="https://open.spotify.com/embed/playlist/37i9dQZF1DXbS8ycxlZ99M" frameborder="0" allow="encrypted-media"></iframe>
                </div>`;
            return;
        }
        
        const loadingId = "loading-" + Date.now();
        container.innerHTML += `
            <div class="bubble rasim" id="${loadingId}">
                <span style="font-size: 11px; color: var(--primary); font-weight: bold;">🤖 ROBOT RASİM</span><br>
                Rasim həm düşünür, həm şəkil çəkir...
                <div class="voice-wave">
                    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
                </div>
            </div>`;
        container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${GROQ_API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: "Sən Robot Rasimsən. Resept verəndə mütləq yeməyin adını ilk sətirdə 'Yemək Adı: [Ad]' formatında yaz. Əgər müddət varsa (məs: 5 dəqiqə), onu da qeyd et." },
                        { role: "user", content: text }
                    ]
                })
            });

            const data = await response.json();
            const rasimText = data.choices[0].message.content;

            // Yemək adını şəkil üçün götür
            const dishMatch = rasimText.match(/Yemək Adı:\s*(.*)/);
            const dishName = dishMatch ? dishMatch[1] : "delicious food";
            const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(dishName)}?width=500&height=300&nologo=true`;

            // Taymer müddətini tap (məs: 10 dəqiqə)
            const timeMatch = rasimText.match(/(\d+)\s*dəqiqə/);
            const timerHtml = timeMatch ? `
                <div class="timer-box">
                    ⏱️ ${timeMatch[1]} dəqiqəlik taymer? 
                    <button class="timer-btn" onclick="startTimer(${timeMatch[1]})">Başlat</button>
                </div>` : "";

            document.getElementById(loadingId).innerHTML = `
                <span style="font-size: 11px; color: var(--primary); font-weight: bold;">🤖 ROBOT RASİM</span><br>
                <img src="${imageUrl}" class="recipe-img" alt="Yemək şəkli">
                <button onclick="speak(\`${rasimText.replace(/`/g, '')}\`)" style="background:none; border:1px solid var(--primary); border-radius:10px; cursor:pointer; font-size:10px; padding:2px 5px;">🔊 Səsli Oxu</button><br><br>
                ${rasimText.replace(/\n/g, '<br>')}
                ${timerHtml}
            `;

            confetti({ particleCount: 100, spread: 70, origin: { y: 0.7 } });
            speak("Reseptiniz hazırdır! Nuş olsun.");

        } catch (e) { 
            document.getElementById(loadingId).innerText = "Xəta oldu!"; 
        }
        container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
    }
</script>
</body>
</html>
