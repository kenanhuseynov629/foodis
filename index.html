<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodis - Robot Rasim AI</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body>

<div class="bg-icons" id="bg-icons"></div>

<header>
    <div class="header-left">
        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Rasim&backgroundColor=ff4757" class="rasim-avatar" alt="Rasim">
        <div><h3 style="margin:0">Foodis 🍳</h3><small>Rasim: Smart Timer Edition 🤖⏱️</small></div>
    </div>
    <button class="mode-toggle-btn" id="theme-btn" onclick="toggleDarkMode()">☀️</button>
</header>

<div id="chat-container">
    <div class="bubble rasim">
        🤖 <b>ROBOT RASİM</b><br>
        Salam! 🌟 Hər addım üçün xüsusi taymerlərim hazırdır! ⏱️<br>
        Məsələn: "Kartofu 5 dəqiqə qızart" desəm, dərhal altında taymer görəcəksən. Başlayaq? 👨‍🍳
    </div>
</div>

<div class="input-area">
    <input type="text" id="user-input" placeholder="Məs: Kartof qızartması resepti ver... 🍗" onkeypress="if(event.key==='Enter') askRasim()">
    <button class="btn-send" onclick="askRasim()">Rasimə De 🚀</button>
</div>

<script>
    const GROQ_API_KEY = "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";
    let chatHistory = [{ role: "system", content: "Sən Robot Rasimsən. Səmimi Azərbaycan dilində, emojilərlə cavab ver. Əvvəlki mesajları yadda saxla. Resept verəndə müddətləri mütləq '[X] dəqiqə' kimi yaz." }];

    // TAYMER OBYEKTLƏRİ SİYAHISI
    let activeTimers = {};

    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        document.getElementById('theme-btn').innerText = document.body.classList.contains('dark-mode') ? '🌙' : '☀️';
    }

    // YENİ TAYMER İDARƏETMƏ FUNKSİYASI
    function controlTimer(id, action, minutes = 0) {
        let t = activeTimers[id];
        
        if (action === 'start') {
            if (t.interval) return;
            t.interval = setInterval(() => {
                if (t.seconds > 0) {
                    t.seconds--;
                    updateTimerUI(id);
                } else {
                    clearInterval(t.interval);
                    t.interval = null;
                    document.getElementById(`time-${id}`).innerText = "BİTDİ! 🔥";
                    confetti({ particleCount: 100 });
                    new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play();
                }
            }, 1000);
        } else if (action === 'pause') {
            clearInterval(t.interval);
            t.interval = null;
        } else if (action === 'reset') {
            clearInterval(t.interval);
            t.interval = null;
            t.seconds = t.total;
            updateTimerUI(id);
        }
    }

    function updateTimerUI(id) {
        let t = activeTimers[id];
        let mins = Math.floor(t.seconds / 60);
        let secs = t.seconds % 60;
        document.getElementById(`time-${id}`).innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        let percent = (t.seconds / t.total) * 100;
        document.getElementById(`bar-${id}`).style.width = percent + "%";
    }

    async function askRasim() {
        const input = document.getElementById('user-input');
        const container = document.getElementById('chat-container');
        const text = input.value.trim();
        if (!text) return;

        container.innerHTML += `<div class="bubble user">😊 ${text}</div>`;
        chatHistory.push({ role: "user", content: text });
        input.value = "";

        const loadingId = "loading-" + Date.now();
        container.innerHTML += `<div class="bubble rasim" id="${loadingId}">🤔 Rasim planlaşdırır...</div>`;
        container.scrollTo(0, container.scrollHeight);

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${GROQ_API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: chatHistory })
            });

            const data = await response.json();
            let rawText = data.choices[0].message.content;
            chatHistory.push({ role: "assistant", content: rawText });

            // MƏTNDƏKİ BÜTÜN DƏQİQƏLƏRİ TAPIB TAYMERƏ ÇEVİRMƏK
            let finalHtml = rawText.replace(/\n/g, '<br>');
            const timeRegex = /(\d+)\s*dəqiqə/g;
            let match;
            
            // Hər bir tapılan vaxt üçün unikal taymer yaradılır
            while ((match = timeRegex.exec(rawText)) !== null) {
                let mins = parseInt(match[1]);
                let tid = "t" + Math.random().toString(36).substr(2, 9);
                activeTimers[tid] = { seconds: mins * 60, total: mins * 60, interval: null };

                let timerUi = `
                <div class="step-timer">
                    <div style="font-size:0.9rem; margin-bottom:5px;">⏱️ ${mins} dəqiqəlik addım</div>
                    <div class="timer-display" id="time-${tid}">${mins}:00</div>
                    <div class="progress-bg"><div class="progress-fill" id="bar-${tid}"></div></div>
                    <div class="timer-controls">
                        <button class="timer-btn btn-start" onclick="controlTimer('${tid}', 'start')">Başlat</button>
                        <button class="timer-btn btn-pause" onclick="controlTimer('${tid}', 'pause')">Durdur</button>
                        <button class="timer-btn btn-reset" onclick="controlTimer('${tid}', 'reset')">Sıfırla</button>
                    </div>
                </div>`;
                
                // Taymeri həmin cümlənin dərhal altına yerləşdiririk
                finalHtml = finalHtml.replace(match[0], `<b>${match[0]}</b>${timerUi}`);
            }

            document.getElementById(loadingId).innerHTML = `🤖 <b>ROBOT RASİM</b><br><br>${finalHtml}`;
        } catch (e) { document.getElementById(loadingId).innerText = "🚨 Xəta! Yenidən yoxla."; }
        container.scrollTo(0, container.scrollHeight);
    }

    // Arxa plan ikonları
    (function createBgIcons() {
        const container = document.getElementById('bg-icons');
        const icons = ['🍎', '🥦', '🍗', '🥘', '🍅', '🍳'];
        for (let i = 0; i < 15; i++) {
            const icon = document.createElement('div');
            icon.className = 'floating-icon';
            icon.innerText = icons[Math.floor(Math.random() * icons.length)];
            icon.style.left = Math.random() * 100 + 'vw';
            icon.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(icon);
        }
    })();
</script>
</body>
</html>
